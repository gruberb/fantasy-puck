server {
    listen 80;
    server_name fantasy-puck.ca;
    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/manifest+json
        image/svg+xml;

    # SPA fallback - rewrite all requests to index.html
    location / {
        try_files $uri $uri/ /index.html;
        # Don't cache index.html so deploys take effect immediately
        add_header Cache-Control "no-cache";
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' https: data:; connect-src 'self' https://api.fantasy-puck.ca wss://api.fantasy-puck.ca http://localhost:* ws://localhost:*; font-src 'self' data:;" always;
    }

    # Cache hashed static assets aggressively (Vite adds content hashes)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache other static files
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|woff2?|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
